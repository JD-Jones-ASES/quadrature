id = "coulomb-pe"
title = "Electric potential energy: why separating charges takes finite energy"
topic = "circuits"
slug = "coulomb-pe"
model = "coulomb-pe"
regime = 2
author = "Quadrature"
created = "2026-06-26"
scenario = "Two opposite point charges ($q_1 = 2\\ \\mu$C, $q_2 = 2\\ \\mu$C) are held a separation $R = 2$ cm apart and attract with $F = kq_1q_2/r^2$. How much energy does it take to pull them fully apart — and why is that energy *finite*? Drag the cursor outward and watch the potential energy climb toward a ceiling as the area under $1/r^2$ converges. This is the electric twin of escape energy: the same inverse-square area, charge in place of mass."
formulas_used = ["em-coulomb", "em-potential-energy"]

[parameters]
k = 8.99e9             # N·m²/C² — Coulomb constant 1/(4πε₀)
q1 = 2e-6             # C — fixed charge magnitude (2 µC)
q2 = 2e-6             # C — moving charge magnitude (2 µC); the slider
R = 0.02             # m — initial separation (2 cm; lower limit of the pull)
r_window = 0.12      # m — how far out the cursor can travel (~6 R)

[[assumptions]]
claim = "Point charges (or spherical charge distributions), so outside them the force is $kq_1q_2/r^2$."
kind = "model"

[[assumptions]]
claim = "Opposite charges (attraction); $q_1, q_2$ are magnitudes, and the energy shown is the work *supplied* to separate them. The potential energy is taken zero at infinite separation."
kind = "model"

[[assumptions]]
claim = "The pull is quasi-static (no kinetic-energy bookkeeping — this is the potential energy alone); $k \\approx 8.99\\times10^{9}$ N·m²/C²."
kind = "model"

[[graphs]]
kind = "area"
mode = "interactive"
annotate = ["area_is_pe", "separation_is_finite"]

[misconception]
claim = "It takes infinite energy to completely separate two bound charges, since the electric force reaches out forever."
refuted_by = "The force does reach out forever, but it *weakens* as $1/r^2$ — and the area under $1/r^2$ from $R$ to infinity is *finite*. That finite area is the binding energy $kq_1q_2/R$: pull the charges to infinity and the work you must supply converges to it, exactly as a rocket needs only finite energy $GMm/R$ to escape a planet. (Bringing point charges all the way *together*, $r\\to 0$, is the end that diverges — not the separation.) Drag the cursor out: the potential energy rises toward a ceiling, not without bound."

[[practice]]
id = "separation-energy"
asks = "the energy to separate the charges completely"
answer = "result:separation_energy"
prompt = 'Two $+2\,\mu$C charges sit $R = 2$ cm apart. How much energy is needed to pull them infinitely far apart?'
include = ["algebra", "calculus"]

  [[practice.distractor]]
  method = "only_to_2R"
  transform = "k*q1*q2/(2*R)"
  misconception = 'That is the work to double the separation ($kq_1q_2/2R$). To pull them fully apart (to infinity) takes $kq_1q_2/R$.'

  [[practice.distractor]]
  method = "force_not_energy"
  transform = "k*q1*q2/R**2"
  misconception = 'That is the electrostatic force $kq_1q_2/R^2$ (in newtons). The energy is $kq_1q_2/R$ (in joules) — one fewer power of $r$.'
