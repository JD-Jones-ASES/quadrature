id = "adiabatic-work"
title = "Adiabatic work: the same area, a steeper curve, a cooler gas"
topic = "thermo"
slug = "adiabatic-work"
model = "adiabatic"
regime = 3
author = "Quadrature"
created = "2026-06-26"
scenario = "A diatomic gas ($\\gamma = 1.4$) expands from $V_1 = 1$ L at $P_1 = 100$ kPa to $V_2 = 3$ L with **no heat exchanged** ($PV^\\gamma = $ const). How much work does it do, and what happens to its temperature? The work is again the area under the $P$–$V$ curve — but the adiabat falls off faster than an isotherm, so the gas does less work and *cools*. Drag the cursor out along the adiabat to watch the work accumulate; raise the initial pressure $P_1$ to lift the whole curve while its shape (and the cooling ratio) stays fixed by $\\gamma$."
formulas_used = ["thermo-adiabatic-work", "thermo-adiabatic-relation", "thermo-ideal-gas"]

[parameters]
P1 = 1e5                # Pa — initial pressure (100 kPa)
V1 = 1e-3              # m³ — initial volume (1 L)
V2 = 3e-3             # m³ — final volume (3 L)
gamma = 1.4            # heat-capacity ratio Cp/Cv (diatomic gas)
v_window = 3.45e-3     # m³ — cursor travel just past V2

[[assumptions]]
claim = "Quasi-static, reversible adiabatic process: no heat crosses the boundary ($Q = 0$), so $PV^\\gamma = $ const holds at every step."
kind = "model"

[[assumptions]]
claim = "Ideal gas with constant $\\gamma$ over the temperature range (no vibrational modes switching on)."
kind = "model"

[[graphs]]
kind = "area"
mode = "interactive"
annotate = ["area_is_work", "adiabat_vs_isotherm"]

[misconception]
claim = "An expanding gas always does the same work for a given change in volume."
refuted_by = "Work is the *area* under the $P$–$V$ curve, and the path sets the curve. An adiabat ($P\\propto V^{-\\gamma}$) falls faster than an isotherm ($P\\propto V^{-1}$), so for the same expansion it encloses less area and does less work. And because no heat flows in, that work is paid out of the gas's internal energy — so the gas cools, $T_2/T_1 = (V_1/V_2)^{\\gamma-1}$. Same volume change, different area, different work."

[[practice]]
id = "work"
asks = "the work done in the adiabatic expansion"
answer = "result:adiabatic_work"
prompt = 'A gas expands adiabatically ($\gamma = 1.4$) from $P_1 = 100$ kPa, $V_1 = 1$ L to $V_2 = 3$ L. How much work does it do?'
include = ["algebra", "calculus"]

  [[practice.distractor]]
  method = "isobaric_rectangle"
  transform = "P1*(V2-V1)"
  misconception = 'Used $P\,\Delta V$ — the constant-pressure rectangle. In an adiabatic expansion the pressure drops fast ($P \propto V^{-\gamma}$), so the work (area) is much less.'

  [[practice.distractor]]
  method = "isothermal_log"
  transform = "P1*V1*log(V2/V1)"
  misconception = 'That is the isothermal work $P_1 V_1\ln(V_2/V_1)$. The adiabat is steeper than the isotherm (the gas also cools), so the adiabatic work is smaller.'
