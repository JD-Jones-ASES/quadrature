id = "spring-shm"
title = "A mass on a spring"
topic = "shm"
slug = "mass-spring"
model = "shm"
regime = 2
author = "Quadrature"
created = "2026-06-26"
scenario = "A 1 kg mass on a spring (k = 4 N/m) is pulled 0.3 m from equilibrium and released from rest. How does it move — and where does the period the algebra course made you memorize actually come from?"
formulas_used = ["shm-x-of-t", "shm-period", "shm-omega"]

[parameters]
m = 1                  # kg
k = 4                  # N/m
x0 = 0.3               # m, initial displacement
v0 = 0                 # m/s, released from rest

[[assumptions]]
claim = "Ideal spring obeying Hooke's law: the restoring force is proportional to displacement."
kind = "model"

[[assumptions]]
claim = "No friction or air resistance (undamped motion)."
kind = "model"

[[assumptions]]
claim = "The mass is a point and the spring is massless."
kind = "model"

[[graphs]]
kind = "stack"
mode = "interactive"
annotate = ["x_v_a_phase", "period"]

[misconception]
claim = "The mass moves fastest at the ends of its swing (the turning points)."
refuted_by = "At a turning point the speed is zero — that is where it reverses. It moves fastest through equilibrium ($x = 0$), where the v-t graph peaks a quarter-period out of phase with x-t. Acceleration, $a = -\\omega^2 x$, is largest at the ends and zero in the middle."

[[practice]]
id = "angular-frequency"
asks = "the angular frequency of the oscillation"
answer = "result:angular_frequency"
prompt = 'A $1$ kg mass on a spring of stiffness $k = 4$ N/m oscillates. What is its angular frequency $\omega$?'
include = ["algebra", "calculus"]

  [[practice.distractor]]
  method = "forgot_sqrt"
  transform = "k/m"
  misconception = 'That is $k/m = \omega^2$. The angular frequency is $\omega = \sqrt{k/m}$.'

  [[practice.distractor]]
  method = "inverted"
  transform = "sqrt(m/k)"
  misconception = 'Used $\sqrt{m/k}$ — that is $1/\omega$ (it appears in the period $T = 2\pi\sqrt{m/k}$), not $\omega$ itself.'

[[practice]]
id = "max-speed"
asks = "the maximum speed of the oscillation"
answer = "result:max_speed"
prompt = 'The same $1$ kg mass on the $k = 4$ N/m spring is pulled to amplitude $A = 0.3$ m and released. What is its **maximum speed**?'
include = ["algebra", "calculus"]

  [[practice.distractor]]
  method = "gave_amplitude"
  transform = "x0"
  misconception = 'That is the **amplitude** (the maximum displacement, in metres), not the speed. The peak speed is $v_{\max} = \omega A$.'

  [[practice.distractor]]
  method = "used_max_accel"
  transform = "(k/m)*x0"
  misconception = 'That is $\omega^2 A$ — the maximum *acceleration*. The maximum speed is one power of $\omega$ lower: $v_{\max} = \omega A$.'
