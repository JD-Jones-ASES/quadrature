id = "em-lc-frequency"
name = "LC angular frequency"
domain = "em"
regime = 2
expr = "1/sqrt(L*C)"
lhs = '\omega'
result_unit = "1/s"
assumptions = ["ideal LC circuit, no resistance", "free oscillation L Q'' + Q/C = 0"]
lessons = ["lc-oscillation"]
citations = []

[variables]
L = { unit = "H", desc = "inductance" }
C = { unit = "F", desc = "capacitance" }

[[edges]]
type = "related-to"
target = "shm-omega"
gloss = "the electrical twin of the spring's ω = √(k/m): L plays the role of mass, 1/C of stiffness"

[[edges]]
type = "derived-from"
target = "em-capacitance"
gloss = "the capacitor's Q/C voltage is the restoring term in the LC equation"

[[edges]]
type = "related-to"
target = "em-lc-period"
gloss = "the period is T = 2π/ω = 2π√(LC)"
